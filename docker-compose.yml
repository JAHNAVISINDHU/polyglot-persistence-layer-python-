#version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: logistics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics_pass}
      POSTGRES_DB: ${POSTGRES_DB:-logistics_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logistics} -d ${POSTGRES_DB:-logistics_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:6
    container_name: logistics_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-logistics}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-logistics_pass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-logistics_db}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j:
    image: neo4j:5
    container_name: logistics_neo4j
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: logistics_app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logistics_pass}
      POSTGRES_DB: ${POSTGRES_DB:-logistics_db}
      MONGO_URI: mongodb://${MONGO_USER:-logistics}:${MONGO_PASSWORD:-logistics_pass}@mongo:27017/${MONGO_DB:-logistics_db}?authSource=admin
      MONGO_DB: ${MONGO_DB:-logistics_db}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-logistics_pass}
      APP_PORT: ${APP_PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./events.log:/app/events.log
      - ./retry_queue.json:/app/retry_queue.json
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
